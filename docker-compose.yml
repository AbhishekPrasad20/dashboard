version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: crm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mypassword}
      POSTGRES_DB: ${DB_NAME:-crm_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Uncomment the lines below and place your SQL files in a 'db-init' folder if you want them to run automatically on first boot.
      # - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      # - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    container_name: crm-backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-mypassword}
      - DB_NAME=${DB_NAME:-crm_db}
      - DB_PORT=5432
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-change_this_to_a_secure_random_string}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:5000/api} # Change 'localhost' to your server's public IP or Domain for production
    container_name: crm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
